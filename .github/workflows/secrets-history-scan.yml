name: Secrets History Scan

on:
  workflow_dispatch:
  schedule:
    - cron: "30 3 * * 1"

permissions:
  contents: read

jobs:
  secrets-history-scan:
    name: secrets-history-scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan repository history for secrets
        run: |
          python3 scripts/secrets_history_scan.py --json > secrets_history_scan_report.json

      - name: Upload scan report
        uses: actions/upload-artifact@v4
        with:
          name: secrets-history-scan-report
          path: secrets_history_scan_report.json
