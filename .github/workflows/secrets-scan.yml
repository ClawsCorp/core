name: Secrets Scan

on:
  pull_request:

permissions:
  contents: read
  pull-requests: read

jobs:
  secrets-scan:
    name: secrets-scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Fetch base branch
        run: git fetch origin "${{ github.base_ref }}" --depth=1
      - name: Scan diff for secrets
        env:
          GITHUB_BASE_REF: ${{ github.base_ref }}
        run: |
          python3 scripts/secrets_scan.py --diff-range "origin/${GITHUB_BASE_REF}...HEAD"
